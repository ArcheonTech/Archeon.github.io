<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1344 982" fill="none">
  <rect width="1344" height="982" fill="white"/>

  <!-- Laptop / Device -->
  <g transform="translate(120, 340)">
    <rect x="20" y="0" width="200" height="140" rx="10" stroke="#333" stroke-width="4" fill="#f8f8f8"/>
    <rect x="40" y="15" width="160" height="100" rx="4" stroke="#333" stroke-width="2" fill="white"/>
    <!-- Screen content - terminal -->
    <text x="55" y="50" font-family="monospace" font-size="14" fill="#22c55e">$ llm --local</text>
    <text x="55" y="70" font-family="monospace" font-size="14" fill="#666">Running on device...</text>
    <text x="55" y="90" font-family="monospace" font-size="12" fill="#22c55e">Ready</text>
    <!-- Laptop base -->
    <path d="M0 140 L20 140 L20 155 Q120 175 220 155 L220 140 L240 140 L240 160 Q120 185 0 160 Z" stroke="#333" stroke-width="3" fill="#e5e5e5"/>
    <text x="120" y="220" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#333">Local Device</text>
  </g>

  <!-- Arrow: Device to LLM -->
  <line x1="380" y1="410" x2="480" y2="410" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue)"/>

  <!-- LLM Brain -->
  <g transform="translate(500, 300)">
    <rect x="0" y="0" width="240" height="200" rx="20" stroke="#2563eb" stroke-width="4" fill="#eff6ff"/>
    <!-- Brain icon -->
    <g transform="translate(80, 25)">
      <path d="M40 10 C20 -5 -5 10 5 35 C-5 50 10 70 30 65 C35 80 55 80 60 65 C80 70 95 50 85 35 C95 10 70 -5 50 10 C47 5 43 5 40 10Z" stroke="#2563eb" stroke-width="3" fill="#bfdbfe"/>
      <path d="M40 25 L40 55 M30 35 L50 35 M25 48 L55 48" stroke="#2563eb" stroke-width="2"/>
    </g>
    <text x="120" y="140" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#2563eb">Local LLM</text>
    <text x="120" y="165" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#666">On-Device Agent</text>
  </g>

  <!-- Shield / Privacy -->
  <g transform="translate(540, 530)">
    <path d="M80 10 L150 40 L150 100 C150 140 80 170 80 170 C80 170 10 140 10 100 L10 40 Z" stroke="#16a34a" stroke-width="4" fill="#dcfce7"/>
    <path d="M60 95 L80 115 L115 70" stroke="#16a34a" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="80" y="200" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#16a34a">Privacy</text>
    <text x="80" y="222" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#666">Data stays local</text>
  </g>

  <!-- Arrow: LLM to Student -->
  <line x1="760" y1="350" x2="860" y2="300" stroke="#f97316" stroke-width="4" marker-end="url(#arrowOrange)"/>
  <!-- Arrow: LLM to Teacher -->
  <line x1="760" y1="450" x2="860" y2="520" stroke="#f97316" stroke-width="4" marker-end="url(#arrowOrange)"/>

  <!-- Student -->
  <g transform="translate(880, 200)">
    <circle cx="60" cy="40" r="35" stroke="#333" stroke-width="3" fill="#fef3c7"/>
    <circle cx="48" cy="35" r="4" fill="#333"/>
    <circle cx="72" cy="35" r="4" fill="#333"/>
    <path d="M45 50 Q60 62 75 50" stroke="#333" stroke-width="2.5" fill="none"/>
    <path d="M25 85 Q60 70 95 85 L95 140 L25 140 Z" stroke="#333" stroke-width="3" fill="#fbbf24"/>
    <text x="60" y="175" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#333">Student</text>
  </g>

  <!-- Teacher -->
  <g transform="translate(880, 440)">
    <circle cx="60" cy="40" r="35" stroke="#333" stroke-width="3" fill="#e0e7ff"/>
    <circle cx="48" cy="35" r="4" fill="#333"/>
    <circle cx="72" cy="35" r="4" fill="#333"/>
    <path d="M45 50 Q60 62 75 50" stroke="#333" stroke-width="2.5" fill="none"/>
    <path d="M25 85 Q60 70 95 85 L95 140 L25 140 Z" stroke="#333" stroke-width="3" fill="#818cf8"/>
    <text x="60" y="175" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#333">Teacher</text>
  </g>

  <!-- Cloud with X (no cloud) -->
  <g transform="translate(1050, 320)">
    <path d="M40 80 Q0 80 0 55 Q0 35 20 30 Q20 5 50 5 Q75 5 80 25 Q105 25 105 50 Q105 80 70 80 Z" stroke="#aaa" stroke-width="3" fill="#f5f5f5" stroke-dasharray="8,4"/>
    <line x1="25" y1="25" x2="85" y2="65" stroke="#ef4444" stroke-width="5" stroke-linecap="round"/>
    <line x1="85" y1="25" x2="25" y2="65" stroke="#ef4444" stroke-width="5" stroke-linecap="round"/>
    <text x="52" y="110" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#aaa">No Cloud</text>
  </g>

  <!-- Arrows defs -->
  <defs>
    <marker id="arrowBlue" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <path d="M0 0 L12 4 L0 8 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrowOrange" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <path d="M0 0 L12 4 L0 8 Z" fill="#f97316"/>
    </marker>
  </defs>
</svg>