<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1344 982" fill="none">
  <rect width="1344" height="982" fill="white"/>

  <!-- Central open book -->
  <g transform="translate(472, 120)">
    <!-- Left page -->
    <path d="M200 0 L0 20 L0 250 L200 230 Z" stroke="#333" stroke-width="3" fill="#fef3c7"/>
    <line x1="25" y1="60" x2="175" y2="48" stroke="#333" stroke-width="1.5"/>
    <line x1="25" y1="90" x2="175" y2="78" stroke="#333" stroke-width="1.5"/>
    <line x1="25" y1="120" x2="175" y2="108" stroke="#333" stroke-width="1.5"/>
    <line x1="25" y1="150" x2="130" y2="141" stroke="#333" stroke-width="1.5"/>
    <!-- Right page -->
    <path d="M200 0 L400 20 L400 250 L200 230 Z" stroke="#333" stroke-width="3" fill="#fffbeb"/>
    <line x1="225" y1="48" x2="375" y2="60" stroke="#333" stroke-width="1.5"/>
    <line x1="225" y1="78" x2="375" y2="90" stroke="#333" stroke-width="1.5"/>
    <line x1="225" y1="108" x2="375" y2="120" stroke="#333" stroke-width="1.5"/>
    <line x1="225" y1="141" x2="330" y2="150" stroke="#333" stroke-width="1.5"/>
    <!-- Spine -->
    <line x1="200" y1="0" x2="200" y2="230" stroke="#333" stroke-width="3"/>
    <!-- Open lock icon on book -->
    <g transform="translate(168, 170)">
      <rect x="0" y="22" width="64" height="45" rx="6" stroke="#16a34a" stroke-width="3" fill="#dcfce7"/>
      <path d="M16 22 L16 14 Q16 0 32 0 Q48 0 48 14 L48 16" stroke="#16a34a" stroke-width="4" fill="none" stroke-linecap="round"/>
      <circle cx="32" cy="42" r="6" fill="#16a34a"/>
    </g>
  </g>

  <text x="672" y="420" text-anchor="middle" font-family="sans-serif" font-size="26" font-weight="bold" fill="#333">Open Educational Resources</text>

  <!-- Three pillars -->
  <!-- Pillar 1: Open Source Tools -->
  <g transform="translate(100, 480)">
    <rect x="0" y="0" width="320" height="240" rx="16" stroke="#2563eb" stroke-width="3" fill="#eff6ff"/>
    <text x="160" y="40" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#2563eb">Open-Source Tools</text>
    <!-- Code brackets icon -->
    <g transform="translate(110, 60)">
      <text x="50" y="45" text-anchor="middle" font-family="monospace" font-size="60" fill="#2563eb">&lt;/&gt;</text>
    </g>
    <text x="160" y="165" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#666">Free software for</text>
    <text x="160" y="185" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#666">educators and learners</text>
    <!-- GitHub icon hint -->
    <g transform="translate(130, 200)">
      <circle cx="30" cy="15" r="14" stroke="#333" stroke-width="2" fill="#f5f5f5"/>
      <circle cx="30" cy="12" r="5" fill="#333"/>
      <path d="M15 25 Q30 32 45 25" stroke="#333" stroke-width="2" fill="none"/>
    </g>
  </g>

  <!-- Pillar 2: Open Datasets -->
  <g transform="translate(510, 480)">
    <rect x="0" y="0" width="320" height="240" rx="16" stroke="#f97316" stroke-width="3" fill="#fff7ed"/>
    <text x="160" y="40" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#f97316">Open Datasets</text>
    <!-- Data table icon -->
    <g transform="translate(100, 60)">
      <rect x="0" y="0" width="120" height="90" rx="6" stroke="#f97316" stroke-width="2.5" fill="white"/>
      <line x1="0" y1="25" x2="120" y2="25" stroke="#f97316" stroke-width="2"/>
      <line x1="0" y1="50" x2="120" y2="50" stroke="#f97316" stroke-width="1.5"/>
      <line x1="0" y1="70" x2="120" y2="70" stroke="#f97316" stroke-width="1.5"/>
      <line x1="40" y1="0" x2="40" y2="90" stroke="#f97316" stroke-width="1.5"/>
      <line x1="80" y1="0" x2="80" y2="90" stroke="#f97316" stroke-width="1.5"/>
      <text x="20" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="#f97316">ID</text>
      <text x="60" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="#f97316">Data</text>
      <text x="100" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="#f97316">Label</text>
    </g>
    <text x="160" y="185" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#666">Curated educational</text>
    <text x="160" y="205" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#666">datasets for research</text>
  </g>

  <!-- Pillar 3: Open Curricula -->
  <g transform="translate(920, 480)">
    <rect x="0" y="0" width="320" height="240" rx="16" stroke="#16a34a" stroke-width="3" fill="#f0fdf4"/>
    <text x="160" y="40" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#16a34a">Open Curricula</text>
    <!-- Stacked documents -->
    <g transform="translate(105, 55)">
      <rect x="10" y="10" width="100" height="80" rx="4" stroke="#aaa" stroke-width="1.5" fill="#e5e5e5"/>
      <rect x="5" y="5" width="100" height="80" rx="4" stroke="#bbb" stroke-width="1.5" fill="#f0f0f0"/>
      <rect x="0" y="0" width="100" height="80" rx="4" stroke="#16a34a" stroke-width="2.5" fill="white"/>
      <line x1="15" y1="18" x2="85" y2="18" stroke="#16a34a" stroke-width="2"/>
      <line x1="15" y1="32" x2="85" y2="32" stroke="#ccc" stroke-width="1.5"/>
      <line x1="15" y1="44" x2="85" y2="44" stroke="#ccc" stroke-width="1.5"/>
      <line x1="15" y1="56" x2="65" y2="56" stroke="#ccc" stroke-width="1.5"/>
    </g>
    <text x="160" y="185" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#666">Shareable, adaptable</text>
    <text x="160" y="205" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#666">course materials</text>
  </g>

  <!-- Connecting lines from book to pillars -->
  <line x1="500" y1="400" x2="260" y2="480" stroke="#2563eb" stroke-width="2.5" stroke-dasharray="6,4"/>
  <line x1="672" y1="400" x2="672" y2="480" stroke="#f97316" stroke-width="2.5" stroke-dasharray="6,4"/>
  <line x1="840" y1="400" x2="1080" y2="480" stroke="#16a34a" stroke-width="2.5" stroke-dasharray="6,4"/>

  <!-- Bottom banner -->
  <g transform="translate(300, 800)">
    <rect x="0" y="0" width="740" height="70" rx="14" stroke="#7c3aed" stroke-width="3" fill="#f5f3ff"/>
    <text x="370" y="30" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#7c3aed">Accessible to All</text>
    <text x="370" y="55" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#888">Free, inclusive, and community-driven educational resources</text>
  </g>
</svg>