<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1344 982" fill="none">
  <rect width="1344" height="982" fill="white"/>

  <!-- Raw LLM -->
  <g transform="translate(100, 300)">
    <rect x="0" y="0" width="220" height="160" rx="16" stroke="#333" stroke-width="4" fill="#f5f5f5"/>
    <!-- Robot face -->
    <rect x="60" y="20" width="100" height="80" rx="12" stroke="#333" stroke-width="3" fill="#e5e5e5"/>
    <rect x="78" y="42" width="18" height="18" rx="3" fill="#333"/>
    <rect x="124" y="42" width="18" height="18" rx="3" fill="#333"/>
    <line x1="88" y1="75" x2="132" y2="75" stroke="#333" stroke-width="3"/>
    <text x="110" y="130" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333">Base LLM</text>
  </g>

  <!-- Arrow 1 -->
  <path d="M340 380 L440 380" stroke="#2563eb" stroke-width="4" marker-end="url(#arrB)"/>

  <!-- Alignment Process -->
  <g transform="translate(460, 220)">
    <rect x="0" y="0" width="300" height="340" rx="20" stroke="#2563eb" stroke-width="4" fill="#eff6ff"/>
    <text x="150" y="40" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#2563eb">Pedagogical Alignment</text>

    <!-- Step 1: Book -->
    <g transform="translate(30, 60)">
      <rect x="0" y="0" width="50" height="60" rx="4" stroke="#333" stroke-width="2.5" fill="#fef3c7"/>
      <line x1="12" y1="15" x2="38" y2="15" stroke="#333" stroke-width="1.5"/>
      <line x1="12" y1="25" x2="38" y2="25" stroke="#333" stroke-width="1.5"/>
      <line x1="12" y1="35" x2="32" y2="35" stroke="#333" stroke-width="1.5"/>
      <line x1="12" y1="45" x2="36" y2="45" stroke="#333" stroke-width="1.5"/>
    </g>
    <text x="115" y="90" font-family="sans-serif" font-size="16" fill="#333">Learning Theory</text>
    <text x="115" y="110" font-family="sans-serif" font-size="14" fill="#888">Bloom's, ZPD, Scaffolding</text>

    <!-- Step 2: Gears -->
    <g transform="translate(35, 150)">
      <circle cx="20" cy="20" r="18" stroke="#2563eb" stroke-width="3" fill="#bfdbfe"/>
      <circle cx="20" cy="20" r="7" fill="#2563eb"/>
      <line x1="20" y1="0" x2="20" y2="6" stroke="#2563eb" stroke-width="3"/>
      <line x1="20" y1="34" x2="20" y2="40" stroke="#2563eb" stroke-width="3"/>
      <line x1="0" y1="20" x2="6" y2="20" stroke="#2563eb" stroke-width="3"/>
      <line x1="34" y1="20" x2="40" y2="20" stroke="#2563eb" stroke-width="3"/>
    </g>
    <text x="115" y="180" font-family="sans-serif" font-size="16" fill="#333">Fine-tuning &amp;</text>
    <text x="115" y="200" font-family="sans-serif" font-size="16" fill="#333">Prompt Engineering</text>

    <!-- Step 3: Checklist -->
    <g transform="translate(30, 240)">
      <rect x="0" y="0" width="50" height="60" rx="4" stroke="#333" stroke-width="2.5" fill="#dcfce7"/>
      <path d="M10 18 L18 26 L35 10" stroke="#16a34a" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M10 38 L18 46 L35 30" stroke="#16a34a" stroke-width="3" fill="none" stroke-linecap="round"/>
    </g>
    <text x="115" y="270" font-family="sans-serif" font-size="16" fill="#333">Evaluation &amp;</text>
    <text x="115" y="290" font-family="sans-serif" font-size="16" fill="#333">Pedagogical Review</text>
  </g>

  <!-- Arrow 2 -->
  <path d="M780 380 L880 380" stroke="#f97316" stroke-width="4" marker-end="url(#arrO)"/>

  <!-- Aligned LLM -->
  <g transform="translate(900, 280)">
    <rect x="0" y="0" width="280" height="200" rx="16" stroke="#16a34a" stroke-width="4" fill="#f0fdf4"/>
    <!-- Robot face with graduation cap -->
    <g transform="translate(90, 15)">
      <!-- Cap -->
      <polygon points="50,0 100,20 50,40 0,20" fill="#333" stroke="#333" stroke-width="2"/>
      <line x1="50" y1="40" x2="50" y2="25" stroke="#333" stroke-width="2"/>
      <line x1="90" y1="25" x2="90" y2="50" stroke="#333" stroke-width="2"/>
      <circle cx="90" cy="52" r="3" fill="#333"/>
      <!-- Face -->
      <rect x="15" y="42" width="70" height="55" rx="10" stroke="#333" stroke-width="3" fill="#bbf7d0"/>
      <rect x="30" y="56" width="14" height="14" rx="3" fill="#333"/>
      <rect x="56" y="56" width="14" height="14" rx="3" fill="#333"/>
      <path d="M35 82 Q50 92 65 82" stroke="#333" stroke-width="2.5" fill="none"/>
    </g>
    <text x="140" y="145" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#16a34a">Aligned LLM</text>
    <text x="140" y="170" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#666">Educationally Sound</text>
    <text x="140" y="190" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#666">Responses</text>
  </g>

  <!-- Bottom examples -->
  <g transform="translate(200, 700)">
    <rect x="0" y="0" width="260" height="80" rx="10" stroke="#ef4444" stroke-width="3" fill="#fef2f2"/>
    <text x="20" y="30" font-family="sans-serif" font-size="15" fill="#ef4444" font-weight="bold">Before:</text>
    <text x="20" y="55" font-family="sans-serif" font-size="14" fill="#666">"The answer is 42."</text>
  </g>
  <g transform="translate(580, 700)">
    <rect x="0" y="0" width="380" height="80" rx="10" stroke="#16a34a" stroke-width="3" fill="#f0fdf4"/>
    <text x="20" y="30" font-family="sans-serif" font-size="15" fill="#16a34a" font-weight="bold">After:</text>
    <text x="20" y="55" font-family="sans-serif" font-size="14" fill="#666">"What steps could lead you to the answer?"</text>
  </g>

  <!-- Arrow between examples -->
  <path d="M475 740 L565 740" stroke="#333" stroke-width="3" marker-end="url(#arrG)"/>

  <defs>
    <marker id="arrB" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <path d="M0 0 L12 4 L0 8 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrO" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <path d="M0 0 L12 4 L0 8 Z" fill="#f97316"/>
    </marker>
    <marker id="arrG" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <path d="M0 0 L12 4 L0 8 Z" fill="#333"/>
    </marker>
  </defs>
</svg>